name: issue and PR lifecycle

on:
  issues:
    types: [opened, labeled, closed]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  schedule:
    - cron: '0 9 * * *'

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  lifecycle:
    uses: projectbluefin/bonedigger/.github/workflows/lifecycle.yml@30a240ea9163790fe9c1f24b2c6ce65af4a71798 # main
    with:
      brand_name: "Dakota"
    secrets: inherit
