name: issue and PR lifecycle

on:
  issues:
    types: [opened, labeled, closed]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  schedule:
    - cron: '0 9 * * *'

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  lifecycle:
    uses: projectbluefin/common/.github/workflows/lifecycle.yml@025ec29f68aa919d1d90a3d4bb04b3e5e4777158 # main
    with:
      brand_name: "Dakota"
    secrets: inherit
