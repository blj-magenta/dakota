name: "Bug report"
description: "Something is broken. Let's fix it together."
title: "[Bug]: "
labels: ["kind/bug"]
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        Found a bug? Let's squash it. 🐛

        **Before you type anything** — if you're on a running Dakota system, run:

        ```bash
        ujust report
        ```

        It collects your system state (kernel, image, extensions, failed units) in a privacy-respecting gist and offers to open this form with it pre-attached. You review everything before it uploads. The gist is yours to keep, share, or delete.

        Already have a gist? Paste the URL in the field below and keep the rest short.

  - type: checkboxes
    id: checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues first"
          required: true

  - type: input
    id: report-link
    attributes:
      label: "ujust report gist URL"
      description: "Paste the URL from `ujust report`. Gives maintainers your image digest, kernel, extensions, and failed units automatically — no need to describe your environment manually."
      placeholder: "https://gist.github.com/..."
    validations:
      required: false

  - type: dropdown
    id: workflow-path
    attributes:
      label: "Workflow path"
      description: "Direct path by default. Pick Raptor Current only if you want the structured agent queue."
      options:
        - "Direct issue (skip workflow)"
        - "Raptor Current (structured + wrangler + agent queue)"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "What did you see? What did you expect? One paragraph is enough."
      placeholder: |
        Bluetooth disappears from the panel after suspend. The indicator is gone until I reboot. Expected it to reconnect automatically.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "Steps to reproduce"
      description: "Minimal steps to hit the bug."
      placeholder: |
        1. Suspend the machine
        2. Wake it
        3. Bluetooth panel indicator is missing
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: "Extra context"
      description: "Optional. Logs, upstream references, affected hardware. Leave blank if your gist covers it."
      placeholder: "Appears on Framework 13 AMD. Not affected on Intel NUC."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        *Once a fix ships in nightly, a maintainer will add verify steps so the community can confirm it with `ujust verify <issue-number>`.*
